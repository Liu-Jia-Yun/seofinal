<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳情 | SOLEXA 尊爵鞋鞋專賣店</title>
  <meta name="description" content="瀏覽 Solexa 尊榮鞋款細節、產品規格、機能特色與尺寸選擇。體驗無微不至的製鞋科技。">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <header></header>

  <main class="section" style="padding-top: 150px; min-height: 80vh;">
    <div class="container" id="detail-page-container">
      
      <!-- Back Link -->
      <a href="javascript:history.back();" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); margin-bottom: 2rem; font-weight: 500; font-family: var(--font-display);">
        <i class="fas fa-arrow-left"></i> 返回上一頁
      </a>

      <!-- Detail Grid (Injected dynamically) -->
      <div id="detail-loader">
        <p style="text-align: center; color: var(--text-muted); font-size: 1.2rem;">正在載入商品資訊...</p>
      </div>

    </div>

    <!-- Related Products -->
    <div class="container" style="margin-top: 8rem;" id="related-container">
      <div class="section-header" style="margin-bottom: 3rem; text-align: left;">
        <span class="section-subtitle" style="margin-bottom: 0.3rem;">YOU MAY ALSO LIKE</span>
        <h2 class="section-title" style="font-size: 2rem; margin-bottom: 0;">您可能也會喜歡</h2>
      </div>
      <div class="products-grid" id="related-products-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </main>

  <footer></footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get('id'));
      
      const container = document.getElementById('detail-page-container');
      const relatedGrid = document.getElementById('related-products-grid');
      const relatedContainer = document.getElementById('related-container');
      
      // 1. Find the target product
      const product = window.SolexaProducts.find(p => p.id === productId);
      
      if (!product) {
        container.innerHTML = `
          <div style="text-align: center; padding: 5rem 0;">
            <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--accent-pink); margin-bottom: 1.5rem;"></i>
            <h2>抱歉，找不到該商品</h2>
            <p style="color: var(--text-secondary); margin: 1rem 0 2.5rem 0;">該商品可能已下架或網址不正確。</p>
            <a href="index.html" class="btn btn-primary">返回首頁</a>
          </div>
        `;
        relatedContainer.style.display = 'none';
        return;
      }
      
      // Set Document Title
      document.title = `${product.name} | SOLEXA 尊爵鞋鞋專賣店`;
      
      // 2. Render details HTML
      container.innerHTML = `
        <a href="javascript:history.back();" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); margin-bottom: 2rem; font-weight: 500; font-family: var(--font-display);">
          <i class="fas fa-arrow-left"></i> 返回上一頁
        </a>
        <div class="detail-grid">
          <!-- Left: Image Gallery -->
          <div class="detail-gallery">
            <img src="${product.image}" alt="${product.name}" class="detail-gallery-img">
          </div>
          
          <!-- Right: Info Panel -->
          <div class="detail-info">
            <div class="detail-category-tags">
              ${product.category.map(c => {
                let tagTxt = '休閒';
                if (c === 'men') tagTxt = '男鞋';
                else if (c === 'women') tagTxt = '女鞋';
                else if (c === 'kids') tagTxt = '童鞋';
                else if (c === 'sports') tagTxt = '運動機能';
                return `<span>${tagTxt}</span>`;
              }).join('<span style="color:var(--text-muted);">/</span>')}
            </div>
            
            <h1 class="detail-name">${product.name}</h1>
            
            <div class="detail-meta">
              <span class="detail-price">${product.price.toLocaleString()}</span>
              <div class="detail-rating-box">
                <i class="fas fa-star"></i>
                <span style="font-weight: 600;">${product.rating}</span>
                <span style="color: var(--text-muted);">/ 5.0</span>
              </div>
            </div>
            
            <p class="detail-desc">${product.description}</p>
            
            <!-- Features List -->
            <div class="detail-features">
              <h4>機能細節</h4>
              <ul class="feature-list">
                ${product.features.map(f => `
                  <li class="feature-list-item">
                    <i class="fas fa-check-circle"></i>
                    <span>${f}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
            
            <!-- Size Selector -->
            <div class="detail-selector">
              <h4>
                <span>選擇尺寸 (EU)</span>
                <span style="font-size: 0.85rem; color: var(--accent-cyan); cursor: pointer;" onclick="showToast('📏 建議依日常運動鞋碼選購即可。', 'info');">尺寸對照表</span>
              </h4>
              <div class="size-grid" id="size-options-grid">
                ${product.sizing.map(size => `
                  <button class="size-btn" data-size="${size}">${size}</button>
                `).join('')}
              </div>
            </div>
            
            <!-- Action buttons -->
            <div class="detail-actions">
              <button class="btn btn-primary" id="add-to-cart-action-btn">
                <i class="fas fa-shopping-cart" style="margin-right: 10px;"></i>加入購物車
              </button>
              <button class="btn btn-secondary" style="flex-grow: 0; width: 60px; padding: 0;" aria-label="收藏商品" onclick="showToast('已將商品加入願望清單！', 'success'); this.querySelector('i').className='fas fa-heart'; this.querySelector('i').style.color='var(--accent-pink)';">
                <i class="far fa-heart" style="font-size: 1.2rem;"></i>
              </button>
            </div>
          </div>
        </div>
      `;
      
      // 3. Size Select Handler
      let selectedSize = null;
      const sizeBtns = document.querySelectorAll('#size-options-grid .size-btn');
      sizeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          sizeBtns.forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
          selectedSize = parseInt(e.currentTarget.getAttribute('data-size'));
        });
      });
      
      // 4. Add to Cart Handler
      const addToCartActionBtn = document.getElementById('add-to-cart-action-btn');
      if (addToCartActionBtn) {
        addToCartActionBtn.addEventListener('click', () => {
          if (!selectedSize) {
            showToast('⚠️ 請先選擇您的鞋子尺寸！', 'info');
            return;
          }
          // Call shared addToCart function from main.js
          addToCart(product.id, selectedSize);
        });
      }
      
      // 5. Render Related Products (same category, excluding current)
      const related = window.SolexaProducts
        .filter(p => p.id !== product.id && p.category.some(cat => product.category.includes(cat)))
        .slice(0, 4);
        
      if (related.length === 0) {
        relatedContainer.style.display = 'none';
      } else {
        related.forEach(p => {
          const card = document.createElement('a');
          card.href = `product-detail.html?id=${p.id}`;
          card.className = 'product-card';
          
          let typeTag = '休閒';
          if (p.category.includes('sports')) typeTag = '機能';
          
          card.innerHTML = `
            <span class="product-tag">${typeTag}</span>
            <div class="product-img-wrapper">
              <img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy">
            </div>
            <div class="product-info">
              <span class="product-cat">${p.category.map(c => {
                if (c === 'men') return '男鞋';
                if (c === 'women') return '女鞋';
                if (c === 'kids') return '童鞋';
                if (c === 'sports') return '運動';
                return '休閒';
              }).join(' / ')}</span>
              <h3 class="product-name">${p.name}</h3>
              <div class="product-footer">
                <span class="product-price">${p.price.toLocaleString()}</span>
                <span class="product-rating"><i class="fas fa-star"></i> ${p.rating}</span>
              </div>
            </div>
          `;
          relatedGrid.appendChild(card);
        });
      }
    });
  </script>
</body>
</html>
