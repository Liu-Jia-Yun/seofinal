<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>女鞋系列 | SOLEXA 尊爵鞋鞋專賣店</title>
  <meta name="description" content="Solexa 精選女鞋系列，展現優雅俐落之美。包含輕量編織慢跑鞋、質感麂皮休閒鞋與厚底防滑涼鞋。全天候自在漫步。">
  <link class="stylesheet" href="assets/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <header></header>

  <main class="section" style="padding-top: 150px;">
    <div class="container">
      <div class="section-header">
        <span class="section-subtitle">WOMEN COLLECTION</span>
        <h1 class="section-title">女鞋系列</h1>
        <p class="section-desc">從容優雅，自信綻放。Solexa 女鞋系列將時尚細節與人體工學完美揉合，提供絕佳足弓支撐與溫柔包覆，讓您的優雅無懈可擊。</p>
      </div>

      <div class="products-grid" id="women-products-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </main>

  <footer></footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('women-products-grid');
      const womenProducts = window.SolexaProducts.filter(p => p.category.includes('women'));
      
      womenProducts.forEach(p => {
        const card = document.createElement('a');
        card.href = `product-detail.html?id=${p.id}`;
        card.className = 'product-card';
        
        let typeTag = '休閒';
        if (p.category.includes('sports')) typeTag = '機能';
        
        card.innerHTML = `
          <span class="product-tag">${typeTag}</span>
          <div class="product-img-wrapper">
            <img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy">
          </div>
          <div class="product-info">
            <span class="product-cat">${p.category.map(c => {
              if (c === 'women') return '女鞋';
              if (c === 'sports') return '運動';
              return '休閒';
            }).join(' / ')}</span>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-footer">
              <span class="product-price">${p.price.toLocaleString()}</span>
              <span class="product-rating"><i class="fas fa-star"></i> ${p.rating}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
