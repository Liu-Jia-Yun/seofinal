<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運動機能系列 | SOLEXA 尊爵鞋鞋專賣店</title>
  <meta name="description" content="Solexa 頂級運動機能鞋款，釋放無限潛能。搭載碳板跑鞋、高筒包覆籃球鞋與全地形越野跑鞋。助力運動表現。">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <header></header>

  <main class="section" style="padding-top: 150px;">
    <div class="container">
      <div class="section-header">
        <span class="section-subtitle">PERFORMANCE & SPORTS</span>
        <h1 class="section-title">運動機能系列</h1>
        <p class="section-desc">科技賦能，探索極限。Solexa 運動系列為專業跑者、籃球員及戶外探索者打造，整合獨特防扭保護與推進回彈避震，為您的每場征服注入飽滿活力。</p>
      </div>

      <div class="products-grid" id="sports-products-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </main>

  <footer></footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('sports-products-grid');
      const sportsProducts = window.SolexaProducts.filter(p => p.category.includes('sports'));

      sportsProducts.forEach(p => {
        const card = document.createElement('a');
        card.href = `product-detail.html?id=${p.id}`;
        card.className = 'product-card';

        card.innerHTML = `
          <span class="product-tag">機能</span>
          <div class="product-img-wrapper">
            <img src="${p.image}" alt="${p.name}" title="${p.name}" class="product-img" loading="lazy">
          </div>
          <div class="product-info">
            <span class="product-cat">${p.category.map(c => {
          if (c === 'men') return '男鞋';
          if (c === 'women') return '女鞋';
          if (c === 'kids') return '童鞋';
          if (c === 'sports') return '運動';
          return '休閒';
        }).join(' / ')}</span>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-footer">
              <span class="product-price">${p.price.toLocaleString()}</span>
              <span class="product-rating"><i class="fas fa-star"></i> ${p.rating}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>

</html>
